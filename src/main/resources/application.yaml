spring:
  application:
    name: yt-stats-service
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  output:
    ansi:
      enabled: ALWAYS
  kafka:
    bootstrap-servers: ${KAFKA_HOST}
    consumer:
      group-id: ${KAFKA_GROUP_ID}
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      auto-offset-reset: earliest
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "com.h3late.stats.dto"
        spring.json.value.default.type: "com.h3late.stats.dto.VideoEventDto"
        spring.json.use.type.headers: false
        security.protocol: SASL_SSL
        sasl.mechanism: PLAIN
        sasl.jaas.config: 'org.apache.kafka.common.security.plain.PlainLoginModule required username="${KAFKA_API_KEY}" password="${KAFKA_API_SECRET}";'
kafka:
  topic: ${KAFKA_TOPIC}
server:
  port: 8081
youtube:
  api-key: ${YOUTUBE_API_KEY}
logging:
  level:
    root: INFO
    # Silence the massive config dump
    org.apache.kafka.clients.producer.ProducerConfig: WARN
    org.apache.kafka.common.config.AbstractConfig: WARN
    # Silence general metadata and heartbeat noise
    org.apache.kafka: WARN
    # Make application logs stand out
    com.h3late.stats: DEBUG
  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss}){faint} %clr(%5p) %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n%wEx"




